name: Smoke Tests

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create screenshots folder
        run: mkdir -p test-results/screenshots

      - name: Run smoke tests
        id: smoke
        run: npx playwright test --grep @smoke
        continue-on-error: true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: test-results/screenshots/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload videos on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: videos-${{ github.run_number }}
          path: test-results/**/*.webm
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

      - name: Slack — PASS
        if: steps.smoke.outcome == 'success'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "✅ AEU Smoke Tests PASSED",
              "attachments": [{
                "color": "good",
                "fields": [
                  {"title": "Repo",   "value": "${{ github.repository }}", "short": true},
                  {"title": "Branch", "value": "${{ github.ref_name }}",   "short": true},
                  {"title": "By",     "value": "${{ github.actor }}",      "short": true},
                  {"title": "Report", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack — FAIL
        if: steps.smoke.outcome == 'failure'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "❌ AEU Smoke Tests FAILED",
              "attachments": [{
                "color": "danger",
                "fields": [
                  {"title": "Repo",   "value": "${{ github.repository }}", "short": true},
                  {"title": "Branch", "value": "${{ github.ref_name }}",   "short": true},
                  {"title": "By",     "value": "${{ github.actor }}",      "short": true},
                  {"title": "Commit", "value": "${{ github.event.head_commit.message }}", "short": false},
                  {"title": "Report", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Fail job if tests failed
        if: steps.smoke.outcome == 'failure'
        run: exit 1